name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Pinned so the gate is reproducible: a new ruff release cannot turn the
      # build red without an explicit bump here.
      - run: pip install "ruff==0.15.17"
      - run: ruff check .

  test:
    name: Tests (deterministic harnesses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # pandoc gives tests/test_ingest.sh a real docx converter; without it that
      # test self-skips its conversion assertions rather than failing.
      - run: sudo apt-get update && sudo apt-get install -y pandoc
      - name: gate / nontext / ingest / ask-router harnesses
        run: |
          bash tests/test_gate_check.sh
          bash tests/test_nontext_sources.sh
          bash tests/test_nfc_sources.sh
          bash tests/test_ingest.sh
          bash tests/test_hwpx_ingest.sh
          bash tests/test_hwp_ingest.sh
          bash tests/test_ask_router.sh
          bash tests/test_validate_sources.sh
          bash tests/test_finalize.sh
          bash tests/test_conflicts.sh
          bash tests/test_corroboration.sh
          bash tests/test_coverage.sh
          bash tests/test_page_template.sh
          bash tests/test_entity_typing.sh
          bash tests/test_entity_audit.sh
          bash tests/test_count_check.sh
          bash tests/test_active_kb_config.sh
      - name: clean-env plugin smoke (pipeline end-to-end)
        run: bash tests/smoke.sh
